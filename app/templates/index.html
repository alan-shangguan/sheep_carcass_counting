<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sheep Carcass Counter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #111;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 20px;
      min-height: 100vh;
    }

    h1 { font-size: 1.4rem; letter-spacing: 0.05em; color: #aef; }

    /* ---- video ---- */
    #stream-container {
      width: 100%;
      max-width: 800px;
      background: #000;
      border: 1px solid #333;
    }
    #stream-img {
      width: 100%;
      display: block;
      min-height: 240px;      /* placeholder height before stream connects */
      background: #000;
    }

    /* ---- status panel ---- */
    #status-panel {
      width: 100%;
      max-width: 800px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .stat-box {
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 12px 16px;
    }
    .stat-label { font-size: 0.75rem; color: #888; margin-bottom: 4px; }
    .stat-value { font-size: 1.5rem; font-weight: bold; }
    #val-count   { color: #ffe066; }
    #val-running { color: #66ff99; }

    /* ---- controls ---- */
    #controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 10px 28px;
      font-size: 1rem;
      font-family: monospace;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      transition: opacity 0.15s;
    }
    button:hover  { opacity: 0.85; }
    button:active { opacity: 0.65; }
    #btn-start { background: #2a9d2a; color: #fff; }
    #btn-stop  { background: #9d2a2a; color: #fff; }
    #btn-reset { background: #4a4a8a; color: #fff; }

    /* ---- status line ---- */
    #status-line {
      font-size: 0.8rem;
      color: #666;
      max-width: 800px;
      width: 100%;
      text-align: right;
      padding-right: 4px;
    }
  </style>
</head>
<body>

  <h1>Sheep Carcass Counter</h1>

  <!-- Live video stream -->
  <div id="stream-container">
    <img id="stream-img" src="/stream" alt="Live feed" />
  </div>

  <!-- State readout -->
  <div id="status-panel">
    <div class="stat-box">
      <div class="stat-label">SESSION COUNT</div>
      <div class="stat-value" id="val-count">--</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">ENGINE STATE</div>
      <div class="stat-value" id="val-running">--</div>
    </div>
  </div>

  <!-- Control buttons -->
  <div id="controls">
    <button id="btn-start" onclick="sendCmd('start')">Start</button>
    <button id="btn-stop"  onclick="sendCmd('stop')">Stop</button>
    <button id="btn-reset" onclick="sendCmd('reset')">Reset</button>
  </div>

  <!-- Server status text (small) -->
  <div id="status-line">status: --</div>

  <script>
    /* ------------------------------------------------------------------
       sendCmd – fire a POST request and let the /state poll update the UI.
       ------------------------------------------------------------------ */
    async function sendCmd(cmd) {
      try {
        const res = await fetch('/' + cmd, { method: 'POST' });
        if (!res.ok) {
          console.warn('Command failed:', cmd, res.status);
        }
      } catch (err) {
        console.error('Network error sending command:', cmd, err);
      }
    }

    /* ------------------------------------------------------------------
       pollState – fetch /state every 500 ms and update the UI.
       ------------------------------------------------------------------ */
    async function pollState() {
      try {
        const res  = await fetch('/state');
        const data = await res.json();

        document.getElementById('val-count').textContent   = data.count;
        document.getElementById('val-running').textContent = data.running ? 'Running' : 'Stopped';
        document.getElementById('val-running').style.color = data.running ? '#66ff99' : '#ff8888';
        document.getElementById('status-line').textContent = 'status: ' + data.status;
      } catch (err) {
        document.getElementById('status-line').textContent = 'status: connection lost';
      }
    }

    /* ------------------------------------------------------------------
       Stream recovery – reload the <img> if the MJPEG connection drops.
       ------------------------------------------------------------------ */
    const streamImg = document.getElementById('stream-img');
    streamImg.onerror = function () {
      setTimeout(function () {
        streamImg.src = '/stream?' + Date.now();
      }, 2000);
    };

    /* Kick off polling immediately, then continue every 500 ms. */
    pollState();
    setInterval(pollState, 500);
  </script>

</body>
</html>
